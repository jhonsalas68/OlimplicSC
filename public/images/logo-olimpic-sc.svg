<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con degradado azul-rojo -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rectángulo de fondo -->
  <rect width="200" height="80" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Balón de voleibol estilizado -->
  <g transform="translate(20, 15)">
    <circle cx="20" cy="20" r="18" fill="white" stroke="#1e3a8a" stroke-width="2"/>
    <!-- Líneas del balón -->
    <path d="M 20 2 Q 35 20 20 38 Q 5 20 20 2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <path d="M 2 20 Q 20 5 38 20 Q 20 35 2 20" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="20" y1="2" x2="20" y2="38" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="2" y1="20" x2="38" y2="20" stroke="#1e3a8a" stroke-width="1.5"/>
  </g>
  
  <!-- Texto OlimpicSC -->
  <text x="100" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="white">
    Olimpic
  </text>
  <text x="100" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">
    SC
  </text>
  
  <!-- Texto SANTA CRUZ pequeño -->
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white" opacity="0.8">
    SANTA CRUZ
  </text>
</svg>
